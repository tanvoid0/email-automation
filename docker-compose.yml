services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=24-alpine
    image: grad-buddy:latest
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    restart: unless-stopped
    # For development hot reload, uncomment the following volume
    # volumes:
    #   - .:/app
    #   - /app/node_modules
